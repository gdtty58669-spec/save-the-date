  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(15, 17, 13, 0.30) 0%,
      rgba(15, 17, 13, 0.15) 40%,
      rgba(15, 17, 13, 0.55) 100%
    );
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp 1.6s ease both;
  }

  .label-top {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(253, 252, 249, 0.92);
    margin-bottom: 0.7rem;
  }

  .label-sub {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(253, 252, 249, 0.72);
    margin-bottom: 1.8rem;
  }

  .names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.2rem, 9vw, 7.5rem);
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #fdfcf9;
    line-height: 1;
    text-shadow: 0 2px 40px rgba(0, 0, 0, 0.3);
    margin-bottom: 1.8rem;
  }

  .rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: min(240px, 60%);
    margin-bottom: 1.8rem;
  }
  .rule::before, .rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(253, 252, 249, 0.35);
  }
  .rule-diamond {
    width: 4px;
    height: 4px;
    background: rgba(253, 252, 249, 0.6);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .date {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.75rem, 1.8vw, 1rem);
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(253, 252, 249, 0.95);
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .venue {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: rgba(253, 252, 249, 0.82);
    line-height: 1.9;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="page">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <p class="label-top">Save the Date</p>
    <p class="label-sub">For the Wedding of</p>
    <h1 class="names">Addie &amp; Max</h1>
    <div class="rule"><div class="rule-diamond"></div></div>
    <p class="date">
      Saturday, the Twenty-Second of May<br>
      Two Thousand &amp; Twenty-Seven
    </p>
    <p class="venue">
      Rokeby<br>
      Barrytown, New York
    </p>
  </div>
</div>
</body>
